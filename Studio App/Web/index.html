<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stem → Ableton</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- ░░ Top bar ░░ -->
    <header class="topbar">
      <div class="brand">
        <img class="brand-mark" src="assets/wm_logo.png" alt="Wired Masters" />
        <div class="brand-text">
          <div class="brand-title">Stem<span>→</span>Ableton</div>
          <div class="brand-sub">studio project setup · <span id="versionBadge">v—</span></div>
        </div>
      </div>

      <div class="topbar-controls">
        <label class="field">
          <span class="field-label">Profile</span>
          <select id="profileSelect" class="select"></select>
        </label>
        <button id="coloursBtn" class="btn ghost">🎨 Colours</button>
        <label class="field subgroups" title="Cluster tracks into nested sub-groups (singer under Vox, Kit/Perc, instrument families)">
          <span class="field-label">Sub-groups</span>
          <div class="sg-toggles">
            <label><input type="checkbox" id="sgVocals" /> Vox</label>
            <label><input type="checkbox" id="sgDrums" /> Drums</label>
            <label><input type="checkbox" id="sgMusic" /> Music</label>
          </div>
        </label>
        <button id="updateBtn" class="btn ghost" title="Check for and install the latest version">⟳ Update</button>
        <label class="field grow">
          <span class="field-label">Output folder</span>
          <div class="folder-row">
            <span id="outputFolder" class="folder-path" title="">—</span>
            <button id="changeFolderBtn" class="btn tiny">Change</button>
          </div>
        </label>
      </div>
    </header>

    <!-- ░░ Stage: project queue (left) + session preview (right) ░░ -->
    <main class="stage">
      <div class="queue-wrap">
        <div id="queue" class="queue"></div>
        <button id="addProjectBtn" class="add-project">
          <span class="plus">+</span> Add another project
        </button>
      </div>

      <!-- Session preview — colour-coded legend of what the app builds. -->
      <aside class="preview">
        <div class="preview-head">
          <span class="lab">Session preview</span>
          <span class="preview-pill">colour language</span>
        </div>
        <div id="previewLanes" class="preview-lanes"></div>
        <div class="preview-legend">
          Live groups &amp; nested sub-groups, clip-coloured per category.
          Toggle sub-groups above to see the tree change.
        </div>
      </aside>
    </main>

    <!-- ░░ Action bar ░░ -->
    <footer class="actionbar">
      <div id="summary" class="summary">No projects queued</div>
      <button id="goBtn" class="btn go" disabled>
        <span class="eq-motif" aria-hidden="true"><i></i><i></i><i></i><i></i></span>Build all <span class="go-sub">— go make a cup of tea ☕</span>
      </button>
    </footer>
  </div>

  <!-- ░░ Colours modal ░░ -->
  <div id="coloursModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h2>Colour profile</h2>
        <button id="closeColours" class="icon-btn">✕</button>
      </div>
      <div class="profile-bar">
        <select id="editProfileSelect" class="select"></select>
        <button id="newProfileBtn" class="btn tiny">+ New</button>
        <button id="deleteProfileBtn" class="btn tiny danger">Delete</button>
      </div>
      <label class="field">
        <span class="field-label">Profile name</span>
        <input id="profileNameInput" class="input" type="text" />
      </label>
      <div id="colourRows" class="colour-rows"></div>
      <div class="modal-foot">
        <button id="saveProfileBtn" class="btn go">Save profile</button>
      </div>
    </div>
  </div>

  <!-- ░░ Progress overlay ░░ -->
  <div id="progressOverlay" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h2>Building your projects</h2>
        <button id="closeProgress" class="icon-btn hidden">✕</button>
      </div>
      <div id="progressList" class="progress-list"></div>
      <div class="modal-foot">
        <div id="progressNote" class="progress-note">Working… you can leave this running.</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
